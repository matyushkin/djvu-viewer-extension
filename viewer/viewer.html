<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DjVu Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #404040; color: #eee; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }

    #toolbar {
      background: #2a2a2a;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      font-size: 13px;
    }
    #toolbar button {
      background: #555; border: none; color: #eee; padding: 4px 10px;
      border-radius: 4px; cursor: pointer;
    }
    #toolbar button:disabled { opacity: 0.4; cursor: default; }
    #toolbar button:hover:not(:disabled) { background: #777; }
    #page-info { min-width: 80px; text-align: center; }
    #dpi-label { white-space: nowrap; }
    #dpi-range { width: 100px; }
    #filename { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #aaa; }
    #status { font-size: 11px; color: #aaa; white-space: nowrap; }

    #canvas-wrap {
      flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 16px;
    }
    canvas { display: block; box-shadow: 0 4px 24px rgba(0,0,0,.6); background: #fff; }
    #error { color: #f88; padding: 16px; }
  </style>
</head>
<body>
<div id="toolbar">
  <button id="prev-btn" disabled>◀</button>
  <span id="page-info">— / —</span>
  <button id="next-btn" disabled>▶</button>
  <span style="width:1px;background:#555;height:20px"></span>
  <label id="dpi-label">DPI: <span id="dpi-val">150</span>
    <input type="range" id="dpi-range" min="36" max="600" step="6" value="150">
  </label>
  <span style="width:1px;background:#555;height:20px"></span>
  <span id="filename"></span>
  <span id="status">Loading…</span>
</div>
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="error"></div>
</div>

<script type="module" src="viewer.js"></script>
</body>
</html>
